discover_key:
  name: Discover key
  description: Brute force the common one-byte pairing key for a blind.
  fields:
    address:
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
    attempts:
      required: false
      default: 256
      selector:
        number:
          min: 1
          max: 256
          mode: box

scan_devices:
  name: Scan devices
  description: Publish a list of currently discovered candidate MySmartBlinds BLE devices.

ping:
  name: Ping blind
  description: Check whether a configured blind is reachable over native Home Assistant Bluetooth.
  fields:
    address:
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
